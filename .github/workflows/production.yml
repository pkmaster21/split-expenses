name: Deploy to Production

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: us-east-1
  LAMBDA_FUNCTION: tabby-prod-api

jobs:
  test:
    name: Full Test Suite
    runs-on: ubuntu-latest
    concurrency:
      group: integration-tests
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=packages/shared
      - name: Push schema to test DB
        working-directory: packages/api
        run: npx drizzle-kit push --force
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Run all tests
        working-directory: packages/api
        run: npx vitest run --reporter=verbose
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  terraform-plan:
    name: Terraform Plan
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.14.8
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Terraform Init
        working-directory: infra
        run: terraform init
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      - name: Terraform Plan
        id: plan
        working-directory: infra
        run: |
          set +e
          terraform plan -out=tfplan -detailed-exitcode
          exit_code=$?
          set -e
          if [ "$exit_code" -eq 2 ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          elif [ "$exit_code" -eq 0 ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            exit $exit_code
          fi
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      - name: Upload plan artifact
        if: steps.plan.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: tfplan
          path: infra/tfplan
          retention-days: 1
    outputs:
      has_changes: ${{ steps.plan.outputs.has_changes }}

  deploy-infrastructure:
    name: Terraform Apply (Manual Approval)
    needs: terraform-plan
    if: needs.terraform-plan.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v5
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.14.8
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Download plan artifact
        uses: actions/download-artifact@v5
        with:
          name: tfplan
          path: infra
      - name: Terraform Init
        working-directory: infra
        run: terraform init
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      - name: Terraform Apply
        working-directory: infra
        run: terraform apply -auto-approve tfplan
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}

  deploy-app:
    name: Deploy App to Production
    needs: [test, deploy-infrastructure]
    if: always() && needs.test.result == 'success' && (needs.deploy-infrastructure.result == 'success' || needs.deploy-infrastructure.result == 'skipped')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - run: npm ci

      - name: Build shared
        run: npm run build --workspace=packages/shared

      - name: Run Drizzle migrations (production DB)
        working-directory: packages/api
        run: npx tsx src/migrate.ts
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}

      - name: Build Lambda package
        working-directory: packages/api
        run: |
          npx esbuild src/lambda.ts \
            --bundle \
            --platform=node \
            --target=node22 \
            --outfile=dist/lambda.js
          cd dist && zip -r ../lambda.zip . && cd ..

      - name: Deploy Lambda
        run: |
          aws lambda update-function-code \
            --function-name $LAMBDA_FUNCTION \
            --zip-file fileb://packages/api/lambda.zip
          aws lambda wait function-updated \
            --function-name $LAMBDA_FUNCTION

      - name: Build React PWA
        run: npm run build --workspace=packages/web
        env:
          VITE_API_URL: ${{ secrets.PROD_API_GATEWAY_URL }}
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy packages/web/dist --project-name=tabby --branch=main
