name: Deploy to Production

on:
  push:
    tags:
      - 'v*'

env:
  AWS_REGION: us-east-1
  LAMBDA_FUNCTION: tabby-prod-api
  S3_BUCKET: tabby-prod-web-assets
  CLOUDFRONT_DISTRIBUTION: ${{ secrets.PROD_CF_DISTRIBUTION_ID }}

jobs:
  test:
    name: Full Test Suite
    runs-on: ubuntu-latest
    concurrency:
      group: integration-tests
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=packages/shared
      - name: Migrate test DB
        working-directory: packages/api
        run: npx drizzle-kit migrate
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      - name: Run all tests
        working-directory: packages/api
        run: npx vitest run --reporter=verbose
        env:
          TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

  terraform-plan:
    name: Terraform Plan
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Terraform Init
        working-directory: infra
        run: terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"
      - name: Terraform Plan
        working-directory: infra
        run: |
          terraform plan -out=tfplan \
            -var="environment=prod" \
            -var="neon_database_url=${{ secrets.NEON_DATABASE_URL }}" \
            -var="cookie_secret=${{ secrets.COOKIE_SECRET }}" \
            -var="cors_origin=${{ secrets.PROD_CORS_ORIGIN }}"
      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: infra/tfplan
          retention-days: 1

  deploy-infrastructure:
    name: Terraform Apply (Manual Approval)
    needs: terraform-plan
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: infra
      - name: Terraform Init
        working-directory: infra
        run: terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"
      - name: Terraform Apply
        working-directory: infra
        run: terraform apply -auto-approve tfplan

  deploy-app:
    name: Deploy App to Production
    needs: deploy-infrastructure
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - run: npm ci

      - name: Build shared
        run: npm run build --workspace=packages/shared

      - name: Run Drizzle migrations (production DB)
        working-directory: packages/api
        run: npx drizzle-kit migrate
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}

      - name: Build Lambda package
        working-directory: packages/api
        run: |
          npx esbuild src/lambda.ts \
            --bundle \
            --platform=node \
            --target=node22 \
            --outfile=dist/lambda.js
          cd dist && zip -r ../lambda.zip . && cd ..

      - name: Deploy Lambda
        run: |
          aws lambda update-function-code \
            --function-name $LAMBDA_FUNCTION \
            --zip-file fileb://packages/api/lambda.zip
          aws lambda wait function-updated \
            --function-name $LAMBDA_FUNCTION

      - name: Build React PWA
        run: npm run build --workspace=packages/web
        env:
          VITE_API_URL: ${{ secrets.PROD_API_URL }}
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      - name: Sync to S3
        run: |
          aws s3 sync packages/web/dist s3://$S3_BUCKET \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp packages/web/dist/index.html s3://$S3_BUCKET/index.html \
            --cache-control "public,max-age=0,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $CLOUDFRONT_DISTRIBUTION \
            --paths "/*"
