name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=packages/shared
      - run: npm run lint

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=packages/shared
      - run: npm run typecheck --workspace=packages/api
      - run: npm run typecheck --workspace=packages/web

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://localhost:5432/unused
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=packages/shared
      - run: |
          cd packages/api
          npx vitest run --reporter=verbose src/__tests__/debt.test.ts src/__tests__/splits.test.ts

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    concurrency:
      group: integration-tests
      cancel-in-progress: false
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=packages/shared
      - name: Push schema to test DB
        working-directory: packages/api
        run: npx drizzle-kit push --force
      - name: Run integration tests
        working-directory: packages/api
        run: npx vitest run --reporter=verbose src/__tests__/api.test.ts

  schema-drift:
    name: Schema Drift Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=packages/shared
      - name: Generate migrations and check for drift
        working-directory: packages/api
        run: |
          npx drizzle-kit generate
          if [ -n "$(git status --porcelain drizzle/)" ]; then
            echo "::error::Schema drift detected — run 'drizzle-kit generate' and commit the result"
            git diff drizzle/
            exit 1
          fi

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=packages/shared
      - run: npm run build --workspace=packages/web
