name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=packages/shared
      - run: npm run lint

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=packages/shared
      - run: npm run typecheck --workspace=packages/api
      - run: npm run typecheck --workspace=packages/web

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=packages/shared
      - run: |
          cd packages/api
          npx vitest run --reporter=verbose src/__tests__/debt.test.ts src/__tests__/splits.test.ts

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    concurrency:
      group: integration-tests
      cancel-in-progress: false
    env:
      TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=packages/shared
      - name: Migrate test DB
        working-directory: packages/api
        run: npx drizzle-kit migrate
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      - name: Run integration tests
        working-directory: packages/api
        run: npx vitest run --reporter=verbose src/__tests__/api.test.ts

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=packages/shared
      - run: npm run build --workspace=packages/web
